<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Portavio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --brand: #5b6af0;
            --brand-dark: #4452d4;
            --brand-light: #7c89f5;
            --accent: #8b5cf6;
            --bg: #0a0d1a;
            --bg2: #0f1323;
            --text: #e2e8f0;
            --muted: #64748b;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 60% 0%, rgba(91, 106, 240, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 10% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                        var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 3rem;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            margin-bottom: 1rem;
        }
        .logo svg { width: 36px; height: 36px; }
        .logo span { color: var(--brand-light); }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.25s;
            font-family: inherit;
        }
        .tab.active {
            background: var(--brand);
            color: white;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: var(--brand);
            background: rgba(91, 106, 240, 0.05);
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(91, 106, 240, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 1rem;
            display: none;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #334155;
            font-size: 13px;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 13px;
            color: #334155;
        }
        .footer a {
            color: var(--brand-light);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <a href="/" class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="lg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#5b6af0"/>
                        <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
                <path d="M24 3L42 13.5V34.5L24 45L6 34.5V13.5L24 3Z" fill="url(#lg)" opacity="0.9"/>
                <path d="M24 12 L26 22 L24 20 L22 22 Z" fill="white" opacity="0.95"/>
                <path d="M24 36 L22 26 L24 28 L26 26 Z" fill="white" opacity="0.5"/>
                <path d="M12 24 L22 22 L20 24 L22 26 Z" fill="white" opacity="0.5"/>
                <path d="M36 24 L26 26 L28 24 L26 22 Z" fill="white" opacity="0.5"/>
                <circle cx="24" cy="24" r="2.5" fill="white"/>
            </svg>
            Port<span>avio</span>
        </a>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label>Work Email</label>
                <input type="email" id="login-email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In to Portavio →</button>
            <div class="error" id="login-error"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="register-name" placeholder="Jane Smith" required>
            </div>
            <div class="form-group">
                <label>Work Email</label>
                <input type="email" id="register-email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="btn">Start Free Trial →</button>
            <div class="error" id="register-error"></div>
        </form>

        <div class="divider">or</div>

        <button class="btn" style="background: white; color: #1f2937; font-weight: 600;">
            <svg style="width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-right: 8px;" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>
    </div>

    <div class="footer">
        By signing in, you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.
    </div>
</div>

<script>
    const API_BASE = 'https://api.portavio.io';  // Change to your API URL

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0) === (tab === 'login'));
        });
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('register-error').style.display = 'none';
    }

    function showError(formType, message) {
        const errorEl = document.getElementById(`${formType}-error`);
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }

    async function api(path, method, body) {
        const response = await fetch(`${API_BASE}${path}`, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    // ============================================================================
	// Pass token via URL to cross-domain app
	// ============================================================================
	 
	
	document.getElementById('login-form').addEventListener('submit', async (e) => {
		e.preventDefault();
		const email = document.getElementById('login-email').value.trim();
		const password = document.getElementById('login-password').value;
	 
		if (!email || !password) {
			showError('login', 'Email and password are required');
			return;
		}
	 
		try {
			const data = await api('/api/auth/login', 'POST', { email, password });
			
			// Pass token via URL hash (works across domains)
			window.location.href = `https://app.portavio.io#token=${data.token}&user=${encodeURIComponent(data.user.name)}`;
			
		} catch (error) {
			showError('login', error.message);
		}
	});

	// Pass token via URL to cross-domain app
    document.getElementById('register-form').addEventListener('submit', async (e) => {
		e.preventDefault();
		const name = document.getElementById('register-name').value.trim();
		const email = document.getElementById('register-email').value.trim();
		const password = document.getElementById('register-password').value;
	 
		if (!name || !email || !password) {
			showError('register', 'All fields are required');
			return;
		}
	 
		if (password.length < 8) {
			showError('register', 'Password must be at least 8 characters');
			return;
		}
	 
		try {
			const data = await api('/api/auth/register', 'POST', { name, email, password });
			
			// Pass token via URL hash
			window.location.href = `https://app.portavio.io#token=${data.token}&user=${encodeURIComponent(data.user.name)}`;
			
		} catch (error) {
			showError('register', error.message);
		}
	});


    // Check for URL parameter to switch to register
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('register') === 'true') {
        switchTab('register');
    }
</script>

</body>
</html>
